    - data:
        code: "\nimport calendar\nimport re\nfrom datetime import datetime, timedelta\n\
          from decimal import Decimal, ROUND_HALF_UP\nfrom typing import Optional\n\
          \n\ndef _fmt(d: datetime) -> str:\n    return f\"{d.year}年{d.month:02d}月{d.day:02d}日\"\
          \n\n\ndef _shift_month(base: datetime, month_delta: int, day: int) -> Optional[datetime]:\n\
          \    y, m = base.year, base.month + month_delta\n    while m < 1:\n    \
          \    m += 12\n        y -= 1\n    while m > 12:\n        m -= 12\n     \
          \   y += 1\n    max_day = calendar.monthrange(y, m)[1]\n    try:\n     \
          \   return base.replace(year=y, month=m, day=min(day, max_day))\n    except\
          \ ValueError:\n        return None\n\n\ndef convert_relative_time_to_absolute(content:\
          \ str, record_date: str) -> str:\n    if not content or not record_date:\n\
          \        return content\n    try:\n        base_date = datetime.strptime(record_date,\
          \ \"%Y-%m-%d\")\n    except Exception:\n        return content\n\n    try:\n\
          \        result = content\n        weekday_names = [\"一\", \"二\", \"三\"\
          , \"四\", \"五\", \"六\", \"日\"]\n        weekday_tokens = [(n, i) for i, n\
          \ in enumerate(weekday_names)] + [\n            (str(i + 1), i) for i in\
          \ range(7)\n        ]\n\n        # 0) 绝对日期先处理，避免后续替换产生「X月X日」被重复匹配\n    \
          \    for match in re.finditer(r\"(?<!\\d)(20\\d{6})(?!\\d)\", result):\n\
          \            s = match.group(1)\n            try:\n                result\
          \ = result.replace(match.group(0), _fmt(datetime.strptime(s, \"%Y%m%d\"\
          )))\n            except ValueError:\n                pass\n        for match\
          \ in re.finditer(r\"(20\\d{2})[-/](\\d{1,2})[-/](\\d{1,2})\", result):\n\
          \            try:\n                y, m, d = int(match.group(1)), int(match.group(2)),\
          \ int(match.group(3))\n                result = result.replace(match.group(0),\
          \ _fmt(datetime(y, m, d)))\n            except ValueError:\n           \
          \     pass\n        for match in re.finditer(r\"(?<![\\d年])(\\d{1,2})月(\\\
          d{1,2})[号日]?\", result):\n            m, d = int(match.group(1)), int(match.group(2))\n\
          \            try:\n                result = result.replace(\n          \
          \          match.group(0), _fmt(base_date.replace(month=m, day=d))\n   \
          \             )\n            except ValueError:\n                pass\n\n\
          \        # 1) 日相对词（长词优先，避免「大后天」被「后天」截断）\n        day_mappings = [\n    \
          \        (\"大前天\", lambda d: d - timedelta(days=3)),\n            (\"大后天\"\
          , lambda d: d + timedelta(days=3)),\n            (\"前天\", lambda d: d -\
          \ timedelta(days=2)),\n            (\"后天\", lambda d: d + timedelta(days=2)),\n\
          \            (\"昨天\", lambda d: d - timedelta(days=1)),\n            (\"\
          今早\", lambda d: d),\n            (\"今晚\", lambda d: d),\n            (\"\
          今天上午\", lambda d: d),\n            (\"今天下午\", lambda d: d),\n          \
          \  (\"今天晚上\", lambda d: d),\n            (\"今天\", lambda d: d),\n      \
          \      (\"刚刚\", lambda d: d),\n            (\"明天\", lambda d: d + timedelta(days=1)),\n\
          \            (\"明日\", lambda d: d + timedelta(days=1)),\n        ]\n   \
          \     for rel_time, calc_date in day_mappings:\n            if rel_time\
          \ in result:\n                result = result.replace(rel_time, _fmt(calc_date(base_date)))\n\
          \n        # 2) 星期相对词（长前缀优先）\n        week_prefixes = [\n            (\"\
          下下周\", 14),\n            (\"下星期\", 7),  # 下星期三 等，按「下周」处理\n            (\"\
          下周\", 7),\n            (\"上上周\", 14),\n            (\"上星期\", 7),\n     \
          \       (\"上周\", 7),\n            (\"这周\", 0),\n            (\"本周\", 0),\n\
          \        ]\n        for prefix, week_offset in week_prefixes:\n        \
          \    for suffix, i in weekday_tokens:\n                pattern = f\"{prefix}{suffix}\"\
          \n                if pattern not in result:\n                    continue\n\
          \                if week_offset == 0:\n                    days_diff = i\
          \ - base_date.weekday()\n                elif prefix.startswith(\"上\"):\n\
          \                    days_back = base_date.weekday() - i + week_offset\n\
          \                    if days_back <= 0:\n                        days_back\
          \ += 7\n                    abs_date = base_date - timedelta(days=days_back)\n\
          \                    result = result.replace(pattern, _fmt(abs_date))\n\
          \                    continue\n                else:\n                 \
          \   days_diff = week_offset + (i - base_date.weekday())\n              \
          \  abs_date = base_date + timedelta(days=days_diff)\n                result\
          \ = result.replace(pattern, _fmt(abs_date))\n\n        for suffix, i in\
          \ weekday_tokens:\n            for pfx in (\"周\", \"星期\"):\n           \
          \     pattern = f\"{pfx}{suffix}\"\n                if pattern in result:\n\
          \                    days_diff = i - base_date.weekday()\n             \
          \       abs_date = base_date + timedelta(days=days_diff)\n             \
          \       result = result.replace(pattern, _fmt(abs_date))\n\n        # 3)\
          \ 月份 + 日\n        month_day_patterns = [\n            (r\"上个月(\\d{1,2})[号日]?\"\
          , -1),\n            (r\"上月(\\d{1,2})[号日]?\", -1),\n            (r\"(?:本月|这个月)(\\\
          d{1,2})[号日]?\", 0),\n            (r\"(?:下个月|下月)(\\d{1,2})[号日]?\", 1),\n\
          \        ]\n        for pat, month_delta in month_day_patterns:\n      \
          \      for match in re.finditer(pat, result):\n                day = int(match.group(1))\n\
          \                abs_date = _shift_month(base_date, month_delta, day)\n\
          \                if abs_date:\n                    result = result.replace(match.group(0),\
          \ _fmt(abs_date))\n\n        # 3b) 单独「X号/X日」（无月份前缀）→ 记账当月对应日期\n        for\
          \ match in re.finditer(r\"(?<![\\d年月])(\\d{1,2})[号日](?![\\d月])\", result):\n\
          \            day = int(match.group(1))\n            if day < 1 or day >\
          \ 31:\n                continue\n            abs_date = _shift_month(base_date,\
          \ 0, day)\n            if abs_date:\n                result = result.replace(match.group(0),\
          \ _fmt(abs_date))\n\n        # 4) 单独「本月/这个月/上个月/下个月」→ 基准日所在月首尾语境，按基准日当天\n\
          \        for word in (\"上个月\", \"上月\", \"下个月\", \"下月\"):\n            if\
          \ word in result:\n                delta = -1 if \"上\" in word else 1\n\
          \                abs_date = _shift_month(base_date, delta, base_date.day)\n\
          \                if abs_date:\n                    result = result.replace(word,\
          \ _fmt(abs_date))\n        for word in (\"本月\", \"这个月\"):\n            if\
          \ word in result:\n                result = result.replace(word, _fmt(base_date))\n\
          \n        # 5) N天前 / N周前 / N个月前 / 半月前\n        for match in re.finditer(r\"\
          (\\d{1,3})天前\", result):\n            n = int(match.group(1))\n        \
          \    result = result.replace(match.group(0), _fmt(base_date - timedelta(days=n)))\n\
          \        for match in re.finditer(r\"(\\d{1,2})周前\", result):\n        \
          \    n = int(match.group(1))\n            result = result.replace(match.group(0),\
          \ _fmt(base_date - timedelta(weeks=n)))\n        for match in re.finditer(r\"\
          (\\d{1,2})个月前\", result):\n            n = int(match.group(1))\n       \
          \     result = result.replace(match.group(0), _fmt(_shift_month(base_date,\
          \ -n, base_date.day) or base_date))\n        if \"半月前\" in result:\n   \
          \         result = result.replace(\"半月前\", _fmt(base_date - timedelta(days=15)))\n\
          \n        return result\n    except Exception:\n        return content\n\
          \n\n\n_AMOUNT_EXPR_RE = re.compile(\n    r\"(?<![\\d.])(\\d+(?:\\.\\d+)?(?:[+\\\
          -*/]\\d+(?:\\.\\d+)?)+)(?![\\d.])\"\n)\n\n\ndef _parse_and_eval(expr: str)\
          \ -> Optional[Decimal]:\n    parts = re.split(r\"([+\\-*/])\", expr)\n \
          \   if not parts or not parts[0]:\n        return None\n    try:\n     \
          \   acc = Decimal(parts[0])\n    except Exception:\n        return None\n\
          \    i = 1\n    while i + 1 < len(parts):\n        op, val_s = parts[i],\
          \ parts[i + 1]\n        try:\n            val = Decimal(val_s)\n       \
          \ except Exception:\n            return None\n        if op == \"+\":\n\
          \            acc += val\n        elif op == \"-\":\n            acc -= val\n\
          \        elif op == \"*\":\n            acc *= val\n        elif op == \"\
          /\":\n            if val == 0:\n                return None\n          \
          \  acc /= val\n        else:\n            return None\n        i += 2\n\
          \    return acc.quantize(Decimal(\"0.01\"), rounding=ROUND_HALF_UP)\n\n\n\
          def _format_amount(val: Decimal) -> str:\n    s = format(val, \"f\")\n \
          \   if \".\" in s:\n        s = s.rstrip(\"0\").rstrip(\".\")\n    return\
          \ s\n\n\ndef collapse_amount_expressions(content: str) -> str:\n    if not\
          \ content:\n        return content\n    result = content\n    matches =\
          \ list(_AMOUNT_EXPR_RE.finditer(result))\n    for m in reversed(matches):\n\
          \        expr = m.group(1)\n        val = _parse_and_eval(expr)\n      \
          \  if val is None:\n            continue\n        replacement = _format_amount(val)\n\
          \        result = result[: m.start(1)] + replacement + result[m.end(1) :]\n\
          \    return result\n\ndef preprocess_content_with_date(content: str, record_date:\
          \ str) -> str:\n    if not record_date:\n        return content\n    try:\n\
          \        return convert_relative_time_to_absolute(content, record_date)\n\
          \    except Exception:\n        return content\n\n\ndef main(arg1: str,\
          \ time: str = None) -> dict:\n    try:\n        if time:\n            t\
          \ = time.strip()\n            if len(t) == 10:\n                record_date\
          \ = datetime.strptime(t, \"%Y-%m-%d\").strftime(\"%Y-%m-%d\")\n        \
          \    else:\n                record_date = datetime.strptime(t[:19], \"%Y-%m-%d\
          \ %H:%M:%S\").strftime(\n                    \"%Y-%m-%d\"\n            \
          \    )\n        else:\n            record_date = datetime.now().strftime(\"\
          %Y-%m-%d\")\n    except Exception:\n        record_date = \"\"\n    try:\n\
          \        out = preprocess_content_with_date(arg1, record_date)\n       \
          \ out = collapse_amount_expressions(out)\n    except Exception:\n      \
          \  out = arg1\n    return {\"result\": out}\n"
