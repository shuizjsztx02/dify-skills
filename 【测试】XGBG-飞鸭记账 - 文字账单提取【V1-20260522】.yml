    - data:
        code: "# -*- coding: utf-8 -*-\n\"\"\"文字账单提取 - JSON 后处理（二级分类 + 交易渠道）\"\"\"\
          \nimport json\nimport re\nfrom datetime import datetime\nfrom typing import\
          \ Any, Dict, List, Optional, Tuple\n\n_KEYS = (\"时间\", \"账单分类\", \"账单二级分类\"\
          , \"交易渠道\", \"类型\", \"金额\", \"事项\")\n\n_STANDALONE_NUM_RE = re.compile(r\"\
          (?<![\\d.])(\\d+(?:\\.\\d+)?)(?![\\d.])\")\n_DATE_MARKER_RE = re.compile(\n\
          \    r\"[月日号]|昨天|今天|前天|后天|星期|上周|下周|大前天|大后天|今早|今晚|刚刚|明日|明天|本月|上月|下月\"\n \
          \   r\"|\\d{4}年\\d{1,2}月\\d{1,2}日\"\n)\n_TIME_FMT_RE = re.compile(r\"(\\\
          d{4})年(\\d{1,2})月(\\d{1,2})日\")\n\n\ndef _parse_classify_tree(classify_raw:\
          \ str) -> Dict[str, Optional[List[str]]]:\n    \"\"\"\n    解析 classify 参数，如：\n\
          \    [工资:{null}，兼职:{null}，人情社交:{职场，亲戚，借用，回礼}]\n    返回 {一级: None 或 [二级,...]}\n\
          \    \"\"\"\n    if not classify_raw or not str(classify_raw).strip():\n\
          \        return {}\n    text = str(classify_raw).strip()\n    text = text.strip(\"\
          []【】\")\n    tree: Dict[str, Optional[List[str]]] = {}\n    for m in re.finditer(r\"\
          ([^:，,\\s]+)\\s*:\\s*\\{([^}]*)\\}\", text):\n        level1 = m.group(1).strip()\n\
          \        inner = m.group(2).strip()\n        if not level1:\n          \
          \  continue\n        if inner.lower() in (\"null\", \"none\", \"无\", \"\"\
          ):\n            tree[level1] = None\n        else:\n            subs = [s.strip()\
          \ for s in re.split(r\"[，,、]\", inner) if s.strip()]\n            tree[level1]\
          \ = subs or None\n    return tree\n\n\ndef _parse_channel_list(raw: str)\
          \ -> List[str]:\n    if not raw or not str(raw).strip():\n        return\
          \ []\n    text = str(raw).strip().strip(\"[]【】\")\n    parts = re.split(r\"\
          [，,、|/;\\s]+\", text)\n    return [p.strip() for p in parts if p.strip()]\n\
          \n\ndef _find_channel_in_text(text: str, candidates: List[str]) -> Optional[str]:\n\
          \    if not text or not candidates:\n        return None\n    matched: List[Tuple[int,\
          \ int, str]] = []\n    for ch in candidates:\n        idx = text.find(ch)\n\
          \        if idx >= 0:\n            matched.append((idx, len(ch), ch))\n\
          \    if not matched:\n        return None\n    matched.sort(key=lambda x:\
          \ (-x[1], x[0]))\n    return matched[0][2]\n\n\ndef resolve_transaction_channel(\n\
          \    user_query: str,\n    _llm_channel: str,\n    valid_check: str,\n \
          \   check: str,\n) -> str:\n    \"\"\"\n    交易渠道规则：\n    1. query 提及渠道 →\
          \ 用 valid_check 白名单校验，合规则用 query 中渠道名（规范到白名单项）\n    2. 未提及或不合规 → 用 check\
          \ 参数；check 为空 → 无\n    \"\"\"\n    whitelist = _parse_channel_list(valid_check)\n\
          \    check_default = str(check or \"\").strip()\n    query = str(user_query\
          \ or \"\")\n\n    mentioned = _find_channel_in_text(query, whitelist)\n\
          \    if mentioned:\n        return mentioned\n\n    if check_default:\n\
          \        check_list = _parse_channel_list(check_default)\n        if len(check_list)\
          \ == 1:\n            return check_list[0]\n        if check_list:\n    \
          \        in_query = _find_channel_in_text(query, check_list)\n         \
          \   return in_query or check_list[0]\n        return check_default\n\n \
          \   return \"无\"\n\n\ndef normalize_secondary_classify(\n    level1: str,\n\
          \    level2: str,\n    classify_tree: Dict[str, Optional[List[str]]],\n\
          ) -> Any:\n    \"\"\"校验并规范化二级分类；无二级体系时返回 null。\"\"\"\n    l1 = str(level1\
          \ or \"\").strip()\n    l2 = str(level2 or \"\").strip()\n    if not l1\
          \ or l1 in (\"无\", \"未知\"):\n        return None\n    if l1 not in classify_tree:\n\
          \        return l2 if l2 and l2 not in (\"无\", \"null\", \"None\") else\
          \ None\n    subs = classify_tree[l1]\n    if subs is None:\n        return\
          \ None\n    if not l2 or l2 in (\"无\", \"null\", \"None\"):\n        return\
          \ None\n    if l2 in subs:\n        return l2\n    for s in subs:\n    \
          \    if s in l2 or l2 in s:\n            return s\n    return None\n\n\n\
          def _search_text_for_item(item: dict, user_query: str) -> str:\n    matter\
          \ = str(item.get(\"事项\") or \"\").strip()\n    if matter and matter not\
          \ in (\"消费\", \"支出\", \"收入\"):\n        return matter\n    return str(user_query\
          \ or \"\")\n\n\ndef resolve_classify_from_query(\n    search_text: str,\n\
          \    classify_tree: Dict[str, Optional[List[str]]],\n) -> Optional[Tuple[str,\
          \ str]]:\n    \"\"\"\n    输入含 classify 树中的二级分类名时，按 classify 列表顺序返回 (一级,\
          \ 二级)。\n    例：汉堡20 + 外卖:{奶茶,汉堡} → (外卖, 汉堡)，优先于同名一级「汉堡:{null}」。\n    \"\"\
          \"\n    query = str(search_text or \"\")\n    if not query or not classify_tree:\n\
          \        return None\n    for level1, subs in classify_tree.items():\n \
          \       if not subs:\n            continue\n        for sub in subs:\n \
          \           if sub and sub in query:\n                return level1, sub\n\
          \    return None\n\n\ndef apply_classify_from_query(\n    row: dict,\n \
          \   classify_tree: Dict[str, Optional[List[str]]],\n    user_query: str,\n\
          ) -> None:\n    matched = resolve_classify_from_query(\n        _search_text_for_item(row,\
          \ user_query), classify_tree\n    )\n    if matched:\n        row[\"账单分类\"\
          ], row[\"账单二级分类\"] = matched\n\n\ndef _extract_standalone_numbers(text:\
          \ str) -> List[str]:\n    return _STANDALONE_NUM_RE.findall(str(text or\
          \ \"\"))\n\n\ndef _query_has_date_marker(query: str) -> bool:\n    return\
          \ bool(_DATE_MARKER_RE.search(str(query or \"\")))\n\n\ndef _num_matches_md(num:\
          \ str, month: int, day: int) -> bool:\n    if \".\" not in num:\n      \
          \  return False\n    parts = num.split(\".\", 1)\n    try:\n        return\
          \ int(parts[0]) == month and int(parts[1]) == day\n    except ValueError:\n\
          \        return False\n\n\ndef _format_record_date(time_str: str) -> Optional[str]:\n\
          \    if not time_str:\n        return None\n    t = str(time_str).strip()\n\
          \    try:\n        if len(t) == 10:\n            d = datetime.strptime(t,\
          \ \"%Y-%m-%d\")\n        else:\n            d = datetime.strptime(t[:19],\
          \ \"%Y-%m-%d %H:%M:%S\")\n        return f\"{d.year}年{d.month:02d}月{d.day:02d}日\"\
          \n    except Exception:\n        return None\n\n\ndef fix_single_number_date_ambiguity(\n\
          \    row: dict, user_query: str, time_str: str = \"\"\n) -> None:\n    \"\
          \"\"单数字输入被 LLM 误解析为月.日时，纠正为当前记账日 + 唯一数字作金额。\"\"\"\n    query = str(user_query\
          \ or \"\")\n    if _query_has_date_marker(query):\n        return\n    nums\
          \ = _extract_standalone_numbers(query)\n    if len(nums) != 1:\n       \
          \ return\n    num = nums[0]\n    if \".\" not in num:\n        return\n\
          \    time_field = str(row.get(\"时间\", \"\"))\n    m = _TIME_FMT_RE.match(time_field)\n\
          \    if not m:\n        return\n    month, day = int(m.group(2)), int(m.group(3))\n\
          \    if not _num_matches_md(num, month, day):\n        return\n    corrected\
          \ = _format_record_date(time_str)\n    if corrected:\n        row[\"时间\"\
          ] = corrected\n    try:\n        row[\"金额\"] = float(num)\n    except (TypeError,\
          \ ValueError):\n        pass\n\n\ndef _parse(raw: str) -> list:\n    if\
          \ not raw or not str(raw).strip():\n        return []\n    s = str(raw).strip()\n\
          \    if s.startswith(\"```json\"):\n        s = s[7:]\n    elif s.startswith(\"\
          ```\"):\n        s = s[3:]\n    if s.endswith(\"```\"):\n        s = s[:-3]\n\
          \    s = s.strip().replace(\"：\", \":\").replace(\"，\", \",\")\n    try:\n\
          \        data = json.loads(s)\n        if isinstance(data, list):\n    \
          \        return data\n        if isinstance(data, dict):\n            return\
          \ [data]\n    except Exception:\n        pass\n    return []\n\n\ndef _norm(\n\
          \    item: dict,\n    classify_tree: Dict[str, Optional[List[str]]],\n \
          \   user_query: str,\n    valid_check: str,\n    check: str,\n    time_str:\
          \ str = \"\",\n) -> Optional[dict]:\n    if not isinstance(item, dict):\n\
          \        return None\n    row = {k: item.get(k, \"\") for k in _KEYS}\n\
          \    if \"账单二级分类\" not in item and item.get(\"二级分类\"):\n        row[\"账单二级分类\"\
          ] = item.get(\"二级分类\", \"\")\n\n    if not str(row.get(\"交易渠道\", \"\")).strip():\n\
          \        row[\"交易渠道\"] = \"无\"\n\n    row[\"交易渠道\"] = resolve_transaction_channel(\n\
          \        user_query, row.get(\"交易渠道\", \"\"), valid_check, check\n    )\n\
          \n    apply_classify_from_query(row, classify_tree, user_query)\n\n    row[\"\
          账单二级分类\"] = normalize_secondary_classify(\n        row.get(\"账单分类\", \"\"\
          ),\n        row.get(\"账单二级分类\", \"\"),\n        classify_tree,\n    )\n\n\
          \    try:\n        row[\"金额\"] = float(row[\"金额\"])\n    except (TypeError,\
          \ ValueError):\n        pass\n\n    fix_single_number_date_ambiguity(row,\
          \ user_query, time_str)\n    return row\n\n\ndef main(\n    llm_text: str,\n\
          \    user_query: str = \"\",\n    classify: str = \"\",\n    valid_check:\
          \ str = \"\",\n    check: str = \"\",\n    time: str = \"\",\n) -> dict:\n\
          \    classify_tree = _parse_classify_tree(classify)\n    raw_list = _parse(llm_text)\n\
          \    bills = [\n        b\n        for b in (\n            _norm(x, classify_tree,\
          \ user_query, valid_check, check, time)\n            for x in raw_list\n\
          \        )\n        if b\n    ]\n    text = json.dumps(bills, ensure_ascii=False)\n\
          \    return {\n        \"text\": text,\n        \"bill_count\": len(bills),\n\
          \        \"structured_output\": bills[0] if bills else {},\n    }\n"
        code_language: python3
